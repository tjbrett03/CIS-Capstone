services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      # Persist interview extractions and sessions across container restarts.
      - ./interviews:/app/interviews
      - ./flask_session:/app/flask_session
    extra_hosts:
      # Allows the container to reach Ollama running on the host machine on Linux.
      # On Mac/Windows with Docker Desktop this is handled automatically.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
